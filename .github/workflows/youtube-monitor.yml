name: YouTube Monitor

on:
  # 允许由外部定时（cron-job.org）通过 API 随时手动触发
  workflow_dispatch:

# 当 5 分钟频率极高时，如果上一次没跑完，直接取消旧的、让最新的立刻运行，避免任务堆积
concurrency:
  group: youtube-monitor-group
  cancel-in-progress: true

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 恢复历史记录缓存
        uses: actions/cache@v4
        with:
          path: history.json
          # 用固定前缀 + run_id 保证每次写入新缓存，同时能回退到最近的缓存
          key: yt-monitor-history-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            yt-monitor-history-${{ runner.os }}-

      - name: 运行监控脚本
        env:
          # 敏感信息从 GitHub Secrets 注入，脚本内 os.getenv() 优先读取
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
          NOTIFICATION_RECIPIENT: ${{ secrets.NOTIFICATION_RECIPIENT }}
          # CI 环境设为空 = 直连 YouTube API
          # 本地开发不设置（脚本默认走 127.0.0.1:7897 Clash 代理）
          CLASH_PROXY_HOST: ''
          CLASH_PROXY_PORT: ''
        run: python yt_monitor.py
