name: YouTube Shorts 监控

on:
  schedule:
    # 每 10 分钟运行一次
    - cron: '*/10 * * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 下载历史记录
        uses: actions/cache@v4
        with:
          path: history.json
          key: yt-monitor-history-${{ runner.os }}
          restore-keys: |
            yt-monitor-history-

      - name: 生成配置文件
        run: |
          cat > config.json << 'EOF'
          {
            "youtube_api_key": "${{ secrets.YOUTUBE_API_KEY }}",
            "channels": {
              "UC2Xj7yOR4FyLMWiUce1vjdA": "Ideas Earth",
              "UC9wjlkT2YBQHuCejvHCztsw": "ViStorm",
              "UCQmgzE_jWnIrGN3jqDQeQCQ": "白雪熊SnowBear",
              "UCUQtsb-9SOtRfONTl4qPw3w": "遇见",
              "UC-4avig6ySwwKLv5SLlXXcg": "WZenKai"
            },
            "smtp": {
              "host": "smtp.qq.com",
              "port": 587,
              "use_tls": true,
              "sender_email": "${{ secrets.SMTP_SENDER }}",
              "password": "${{ secrets.SMTP_PASSWORD }}"
            },
            "notification": {
              "recipient_email": "${{ secrets.NOTIFICATION_RECIPIENT }}",
              "max_videos_per_channel": 5
            }
          }
          EOF

      - name: 运行监控
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
          NOTIFICATION_RECIPIENT: ${{ secrets.NOTIFICATION_RECIPIENT }}
        run: python yt_monitor.py --shorts
